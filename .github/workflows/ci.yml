name: Build, Test & Deploy

on:
  push:
    branches:
      - '**'
  pull_request:

permissions:
  contents: write

jobs:
  # ── Legacy static site tests (main branch only) ────────────────────
  legacy-tests:
    name: Legacy E2E Tests
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/main'
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Node 20
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install root dependencies
        run: npm install

      - name: Install Playwright browsers
        run: npx playwright install --with-deps chromium

      - name: Run legacy E2E tests
        run: npx playwright test

  # ── Angular app build + tests ──────────────────────────────────────
  angular-build:
    name: Angular Build & E2E
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: angular-app
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Node 20
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install Angular dependencies
        run: npm ci

      - name: Build Angular app
        run: npm run build

      - name: Install Playwright browsers
        run: npx playwright install --with-deps chromium

      - name: Run Angular E2E tests
        run: npm run e2e

      # Deploy to gh-pages when commit message contains MAIN keyword
      - name: Deploy to GitHub Pages
        if: |
          github.event_name == 'push' &&
          contains(github.event.head_commit.message, 'MAIN')
        run: npx ng deploy --no-build
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
