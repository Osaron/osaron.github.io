<div class="vid-hero">
  <h1><i class="fa-solid fa-video"></i> Videos</h1>
  <p>Technical walkthroughs and documentation demos — created to support users and teams.</p>
</div>

<section class="vid-grid">

  <div class="vid-card">
    @if (!playing()) {
      <div class="vid-thumbnail" (click)="play()" title="Play video">
        <img
          src="https://img.youtube.com/vi/LRfRSGTluTM/maxresdefault.jpg"
          alt="Geome User Guide walkthrough thumbnail">
        <div class="vid-play-btn">
          <i class="fa-solid fa-play"></i>
        </div>
      </div>
    } @else {
      <div class="vid-embed">
        <iframe
          [src]="embedUrl"
          allow="autoplay; encrypted-media; picture-in-picture"
          allowfullscreen
          title="Geome User Guide">
        </iframe>
      </div>
    }
    <div class="vid-meta">
      <span class="vid-tag">User Guide</span>
      <h2>Geome User Guide — Walkthrough</h2>
      <p>A complete walkthrough of the Geome software user guide, covering key workflows, navigation, and documentation structure.</p>
    </div>
  </div>

</section>
